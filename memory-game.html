<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #c8e6c9, #a5d6a7, #81c784);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 卡通云朵装饰 */
        body::before {
            content: '';
            position: fixed;
            top: 10%;
            left: 5%;
            width: 100px;
            height: 60px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            box-shadow: 40px 10px 0 rgba(255, 255, 255, 0.5);
            z-index: 0;
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            top: 20%;
            right: 10%;
            width: 80px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            box-shadow: 30px 8px 0 rgba(255, 255, 255, 0.4);
            z-index: 0;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .game-container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #1b5e20;
            font-size: 36px;
            margin-bottom: 30px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        h1::before {
            content: '🌟';
            position: absolute;
            left: -50px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 32px;
            animation: sparkle 2s ease-in-out infinite;
        }

        h1::after {
            content: '🌟';
            position: absolute;
            right: -50px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 32px;
            animation: sparkle 2s ease-in-out infinite reverse;
        }

        @keyframes sparkle {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.2); }
        }

        .game-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            border: 3px solid #81c784;
        }

        .stat-item {
            font-size: 18px;
            font-weight: 600;
            color: #2e7d32;
        }

        .stat-value {
            font-weight: 700;
            color: #1b5e20;
            font-size: 20px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
        }

        .card {
            width: 100%;
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            perspective: 1000px;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            border: 4px solid transparent;
        }

        .card-back {
            background: linear-gradient(135deg, #43a047, #66bb6a);
            color: white;
            font-size: 32px;
            border-color: #2e7d32;
            position: relative;
            overflow: hidden;
        }

        .card-back::before {
            content: '🌿';
            font-size: 28px;
            position: absolute;
            top: 5px;
            right: 5px;
            opacity: 0.3;
        }

        .card-back::after {
            content: '🌿';
            font-size: 20px;
            position: absolute;
            bottom: 5px;
            left: 5px;
            opacity: 0.3;
            transform: rotate(180deg);
        }

        .card-front {
            background: linear-gradient(135deg, #ffffff, #f1f8e9);
            color: #333;
            font-size: 48px;
            transform: rotateY(180deg);
            border-color: #aed581;
            position: relative;
        }

        .card-front::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 2px dashed #c5e1a5;
            border-radius: 12px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #66bb6a, #43a047);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
            border: 3px solid #2e7d32;
            position: relative;
            overflow: hidden;
        }

        .restart-btn::before {
            content: '🔄';
            margin-right: 8px;
            font-size: 20px;
        }

        .restart-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.5);
        }

        .restart-btn:active {
            transform: translateY(0) scale(1);
        }

        .message {
            margin-top: 20px;
            font-size: 20px;
            font-weight: 600;
            color: #1b5e20;
            min-height: 28px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 15px;
            display: inline-block;
            border: 2px solid #81c784;
        }

        /* 卡通小动物装饰 */
        .decoration {
            position: fixed;
            font-size: 40px;
            z-index: 0;
            opacity: 0.6;
            animation: wiggle 3s ease-in-out infinite;
        }

        .decoration-1 { top: 15%; left: 8%; animation-delay: 0s; }
        .decoration-2 { top: 25%; right: 12%; animation-delay: 0.5s; }
        .decoration-3 { bottom: 20%; left: 10%; animation-delay: 1s; }
        .decoration-4 { bottom: 15%; right: 8%; animation-delay: 1.5s; }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        @media (max-width: 480px) {
            .card-grid {
                gap: 10px;
                padding: 15px;
            }

            .card-front {
                font-size: 36px;
            }

            .card-back {
                font-size: 24px;
            }

            h1 {
                font-size: 28px;
            }

            h1::before,
            h1::after {
                display: none;
            }

            .game-stats {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .decoration {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- 卡通小动物装饰 -->
    <div class="decoration decoration-1">🐸</div>
    <div class="decoration decoration-2">🦋</div>
    <div class="decoration decoration-3">🐛</div>
    <div class="decoration decoration-4">🌸</div>
    
    <div class="game-container">
        <h1>🎮 记忆翻牌游戏 🎮</h1>
        
        <div class="game-stats">
            <div class="stat-item">
                尝试次数: <span class="stat-value" id="attempts">0</span>
            </div>
            <div class="stat-item">
                匹配对数: <span class="stat-value" id="matches">0</span>
            </div>
        </div>

        <div class="card-grid" id="cardGrid"></div>

        <button class="restart-btn" id="restartBtn">重新开始</button>
        
        <div class="message" id="message"></div>
    </div>

    <script>
        // Emoji 表情集合
        const emojis = ['😊', '😂', '😍', '🤔', '😎', '😢', '🤣', '😡'];
        
        // 游戏状态
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let attempts = 0;
        let lockBoard = false;

        // DOM 元素
        const cardGrid = document.getElementById('cardGrid');
        const attemptsElement = document.getElementById('attempts');
        const matchesElement = document.getElementById('matches');
        const restartBtn = document.getElementById('restartBtn');
        const messageElement = document.getElementById('message');

        // 音效系统
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // 播放翻牌音效（轻快的"叮"声）
        function playFlipSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // 使用正弦波，频率为880Hz（高C音）
            oscillator.frequency.value = 880;
            oscillator.type = 'sine';
            
            // 设置音量包络
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        // 播放匹配成功音效（"叮咚"声）
        function playMatchSound() {
            const oscillator1 = audioContext.createOscillator();
            const oscillator2 = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator1.connect(gainNode);
            oscillator2.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // 第一个音：523Hz（C5）
            oscillator1.frequency.value = 523.25;
            oscillator1.type = 'sine';
            
            // 第二个音：659Hz（E5），延迟100ms播放
            oscillator2.frequency.value = 659.25;
            oscillator2.type = 'sine';
            
            // 设置音量
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
            
            // 播放第一个音
            oscillator1.start(audioContext.currentTime);
            oscillator1.stop(audioContext.currentTime + 0.2);
            
            // 播放第二个音（延迟）
            oscillator2.start(audioContext.currentTime + 0.1);
            oscillator2.stop(audioContext.currentTime + 0.3);
        }

        // 播放胜利音乐
        function playWinMusic() {
            const notes = [
                { freq: 523.25, duration: 0.2, delay: 0 },      // C5
                { freq: 523.25, duration: 0.2, delay: 0.2 },    // C5
                { freq: 523.25, duration: 0.2, delay: 0.4 },    // C5
                { freq: 659.25, duration: 0.4, delay: 0.6 },    // E5
                { freq: 523.25, duration: 0.2, delay: 1.0 },    // C5
                { freq: 659.25, duration: 0.2, delay: 1.2 },    // E5
                { freq: 783.99, duration: 0.6, delay: 1.4 }     // G5
            ];
            
            notes.forEach(note => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = note.freq;
                oscillator.type = 'sine';
                
                const startTime = audioContext.currentTime + note.delay;
                gainNode.gain.setValueAtTime(0.3, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + note.duration);
                
                oscillator.start(startTime);
                oscillator.stop(startTime + note.duration);
            });
        }

        // 初始化游戏
        function initGame() {
            // 重置游戏状态
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            attempts = 0;
            lockBoard = false;
            
            // 更新UI
            attemptsElement.textContent = '0';
            matchesElement.textContent = '0';
            messageElement.textContent = '';
            cardGrid.innerHTML = '';
            
            // 创建卡片
            createCards();
        }

        // 创建卡片
        function createCards() {
            // 复制emoji数组，创建配对
            const emojiPairs = [...emojis, ...emojis];
            
            // 洗牌算法
            shuffleArray(emojiPairs);
            
            // 创建卡片元素
            emojiPairs.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.emoji = emoji;
                card.dataset.index = index;
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">${emoji}</div>
                        <div class="card-back">🌿</div>
                    </div>
                `;
                
                card.addEventListener('click', flipCard);
                cardGrid.appendChild(card);
                cards.push(card);
            });
        }

        // 翻牌功能
        function flipCard() {
            if (lockBoard) return;
            if (this.classList.contains('flipped')) return;
            
            // 播放翻牌音效
            playFlipSound();
            
            // 翻转卡片
            this.classList.add('flipped');
            flippedCards.push(this);
            
            // 检查是否翻转了两张卡片
            if (flippedCards.length === 2) {
                checkForMatch();
            }
        }

        // 检查配对
        function checkForMatch() {
            lockBoard = true;
            const [card1, card2] = flippedCards;
            
            attempts++;
            attemptsElement.textContent = attempts;
            
            if (card1.dataset.emoji === card2.dataset.emoji) {
                // 配对成功
                matchedPairs++;
                matchesElement.textContent = matchedPairs;
                
                // 播放匹配成功音效
                playMatchSound();
                
                // 添加匹配成功动画
                card1.classList.add('matched');
                card2.classList.add('matched');
                
                card1.removeEventListener('click', flipCard);
                card2.removeEventListener('click', flipCard);
                
                flippedCards = [];
                lockBoard = false;
                
                // 检查游戏是否结束
                if (matchedPairs === emojis.length) {
                    messageElement.textContent = `恭喜！你用了 ${attempts} 次尝试完成了游戏！`;
                    // 播放胜利音乐
                    setTimeout(() => playWinMusic(), 500);
                }
            } else {
                // 配对失败，翻回卡片
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    lockBoard = false;
                }, 1000);
            }
        }

        // 洗牌算法
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 重新开始游戏
        restartBtn.addEventListener('click', initGame);

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
